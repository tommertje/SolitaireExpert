name: Unity Store Builds

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release title (optional)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  windows:
    name: Windows Standalone
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          unityVersion: 6000.4.1f1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/StandaloneWindows64

  webgl:
    name: WebGL Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          unityVersion: 6000.4.1f1

      - name: Upload WebGL artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: build/WebGL

  windows-installer:
    name: Windows Installer
    needs: windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows build artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: build/StandaloneWindows64

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: powershell
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc `
            "/DSourceDir=${{ github.workspace }}\build\StandaloneWindows64" `
            "/DOutputDir=${{ github.workspace }}\dist" `
            "/DMyAppVersion=1.0.${{ github.run_number }}" `
            "${{ github.workspace }}\ci\windows\SolitaireExpert.iss"

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/SolitaireExpertSetup.exe

  publish-release:
    name: Publish End-User Downloads
    needs: [windows-installer, webgl]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release

      - name: Download WebGL artifact
        uses: actions/download-artifact@v4
        with:
          name: webgl-build
          path: release/webgl-build

      - name: Zip WebGL build
        run: cd release && zip -r webgl-build.zip webgl-build

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: ${{ github.event.inputs.release_name || format('End-User Build {0}', github.run_number) }}
          draft: false
          prerelease: false
          files: |
            release/SolitaireExpertSetup.exe
            release/webgl-build.zip
